<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Processor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Styles & Print Styles */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* Hide elements by default */
        .hidden-view { display: none !important; }

        /* Custom Scrollbar for inner content */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Select Color States */
        select.status-pass { background-color: #dcfce7; color: #166534; font-weight: 600; }
        select.status-fail { background-color: #fee2e2; color: #991b1b; font-weight: 600; }
        select.status-na { background-color: #e2e8f0; color: #475569; font-weight: 600; }

        @media print {
            @page {
                size: A4 landscape;
                margin: 1cm;
            }
            body {
                background: white !important;
                color: black !important;
            }
            /* Hide UI components not meant for the printed document */
            #sidebar, #top-header, .no-print {
                display: none !important;
            }
            #main-content {
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
                height: auto !important;
                display: block !important;
            }
            .print-only {
                display: block !important;
            }
            
            /* Ensure the active sheet is printed, hide dashboard if open */
            #dashboard-view { display: none !important; }
            .sheet-view.active-sheet { display: block !important; }
            .sheet-view:not(.active-sheet) { display: none !important; }

            /* Table Print Formatting */
            table {
                width: 100% !important;
                border-collapse: collapse !important;
                page-break-inside: auto;
            }
            tr { page-break-inside: avoid; page-break-after: auto; }
            th {
                background-color: #e5e7eb !important;
                color: black !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                font-weight: bold;
            }
            th, td {
                border: 1px solid #000 !important;
                padding: 6px !important;
                font-size: 10pt !important;
            }
            
            /* Flatten form inputs to look like normal text on print */
            input, select, textarea {
                border: none !important;
                background: transparent !important;
                color: black !important;
                box-shadow: none !important;
                outline: none !important;
                padding: 0 !important;
                margin: 0 !important;
                -webkit-appearance: none !important;
                appearance: none !important;
                font-size: 10pt !important;
                width: auto !important;
            }
            /* Hide the dropdown arrow in select */
            select::-ms-expand { display: none; }
            input::placeholder, textarea::placeholder { color: transparent !important; }
        }
    </style>
</head>

                const linkBtn = document.createElement('button');
                linkBtn.id = `nav-${safeId}`;
                linkBtn.className = "w-full flex items-center space-x-3 px-6 py-2.5 text-left text-slate-300 hover:bg-slate-800 hover:text-white transition-colors nav-btn text-sm";
                linkBtn.innerHTML = `
                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                    <span>${sheetName}</span>
                `;
                linkBtn.onclick = () => switchTab(sheetName);
                sidebarLinks.appendChild(linkBtn);

                // 3. Generate Dashboard Cards
                const card = document.createElement('div');
                card.id = `card-${safeId}`;
                card.className = "bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col cursor-pointer hover:shadow-md transition-shadow";
                card.onclick = () => switchTab(sheetName);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-2 bg-blue-50 text-blue-600 rounded-lg">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3" /></svg>
                        </div>
                        <span class="text-xs font-semibold px-2 py-1 bg-gray-100 text-gray-500 rounded-full status-badge">0%</span>
                    </div>
                    <h4 class="text-lg font-semibold text-gray-800">${sheetName}</h4>
                    <p class="text-sm text-gray-500 mt-1 mb-4 flex-1">Complete the mandatory quality checks for this platform.</p>
                    <div>
                        <div class="flex justify-between text-xs text-gray-500 mb-1">
                            <span>Progress</span>
                            <span class="progress-text">0 / ${appState[sheetName].total}</span>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-2">
                            <div class="bg-blue-600 h-2 rounded-full transition-all duration-500 progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                `;
                dashboardGrid.appendChild(card);

                // 4. Generate Data Tables (Sheets)
                const sheetDiv = document.createElement('div');
                sheetDiv.id = `sheet-${safeId}`;
                sheetDiv.className = "sheet-view hidden-view bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden";
                sheetDiv.dataset.sheetName = sheetName;
                
                let tableHTML = `
                    <div class="px-6 py-5 border-b border-gray-200 bg-white print-only" style="display:none;">
                        <h3 class="text-xl font-bold text-gray-900">QC Checklist: ${sheetName}</h3>
                        <p class="text-sm text-gray-500">Official Quality Control Document</p>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-600 text-sm leading-normal border-b border-gray-200">
                                    <th class="py-3 px-4 font-semibold w-12 text-center border-r border-gray-200">#</th>
                                    <th class="py-3 px-4 font-semibold w-1/6 border-r border-gray-200">Category</th>
                                    <th class="py-3 px-4 font-semibold w-1/4 border-r border-gray-200">Check Item</th>
                                    <th class="py-3 px-4 font-semibold w-1/4 border-r border-gray-200">Criteria</th>
                                    <th class="py-3 px-4 font-semibold w-32 border-r border-gray-200 text-center">Result</th>
                                    <th class="py-3 px-4 font-semibold border-r border-gray-200">Notes</th>
                                    <th class="py-3 px-4 font-semibold w-24 border-r border-gray-200">Sign</th>
                                    <th class="py-3 px-4 font-semibold w-32">Date</th>
                                </tr>
                            </thead>
                            <tbody class="text-gray-700 text-sm">
                `;

                qcData[sheetName].forEach(item => {
                    tableHTML += `
                        <tr class="border-b border-gray-200 hover:bg-gray-50 transition-colors">
                            <td class="py-3 px-4 text-center font-medium border-r border-gray-200">${item.no}</td>
                            <td class="py-3 px-4 border-r border-gray-200 text-gray-600">${item.category}</td>
                            <td class="py-3 px-4 border-r border-gray-200 font-medium">${item.check_item}</td>
                            <td class="py-3 px-4 border-r border-gray-200 text-gray-500 text-xs">${item.criteria}</td>
                            <td class="py-3 px-4 border-r border-gray-200 text-center">
                                <select class="w-full bg-white border border-gray-300 text-gray-700 py-1.5 px-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" onchange="updateRowColor(this, '${sheetName}')">
                                    <option value="" disabled selected>-</option>
                                    <option value="Pass">Pass</option>
                                    <option value="Fail">Fail</option>
                                    <option value="N/A">N/A</option>
                                </select>
                            </td>
                            <td class="py-3 px-4 border-r border-gray-200">
                                <textarea rows="1" class="w-full bg-transparent border-0 border-b border-transparent focus:border-blue-500 focus:ring-0 resize-none text-sm p-1" placeholder="Add notes..."></textarea>
                            </td>
                            <td class="py-3 px-4 border-r border-gray-200">
                                <input type="text" class="checked-by w-full bg-transparent border-0 border-b border-transparent focus:border-blue-500 focus:ring-0 text-sm p-1 uppercase text-center" placeholder="Initials">
                            </td>
                            <td class="py-3 px-4">
                                <input type="date" class="date-field w-full bg-transparent border-0 border-b border-transparent focus:border-blue-500 focus:ring-0 text-sm p-1 text-gray-600">
                            </td>
                        </tr>
                    `;
                });

                tableHTML += `</tbody></table></div>`;
                sheetDiv.innerHTML = tableHTML;
                sheetsContainer.appendChild(sheetDiv);
            });
            
            // Set initial state
            updateDashboardStats();
        });

        function switchTab(tabId) {
            activeTabID = tabId;
            const safeId = tabId.replace(/\s+/g, '-');
            
            // Reset Sidebar Styles
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-slate-800', 'border-r-4', 'border-blue-500', 'text-blue-400', 'font-medium');
                btn.classList.add('text-slate-300');
            });
            
            // Set Active Sidebar Style
            const activeBtn = document.getElementById(`nav-${safeId}`) || document.getElementById('nav-dashboard');
            activeBtn.classList.add('bg-slate-800', 'border-r-4', 'border-blue-500', 'text-blue-400', 'font-medium');
            activeBtn.classList.remove('text-slate-300');

            // Toggle Views
            const dashboardView = document.getElementById('dashboard-view');
            const sheetsContainer = document.getElementById('sheets-container');
            const bulkTool = document.getElementById('bulk-fill-tool');
            const title = document.getElementById('header-title');

            document.querySelectorAll('.sheet-view').forEach(sheet => {
                sheet.classList.add('hidden-view');
                sheet.classList.remove('active-sheet'); // used for print targeting
            });

            if (tabId === 'dashboard') {
                dashboardView.classList.remove('hidden-view');
                sheetsContainer.classList.add('hidden-view');
                bulkTool.classList.add('hidden');
                title.textContent = 'Overview Dashboard';
            } else {
                dashboardView.classList.add('hidden-view');
                sheetsContainer.classList.remove('hidden-view');
                bulkTool.classList.remove('hidden');
                title.textContent = `${tabId} Checklist`;
                
                const targetSheet = document.getElementById(`sheet-${safeId}`);
                targetSheet.classList.remove('hidden-view');
                targetSheet.classList.add('active-sheet');
            }
        }

        function updateRowColor(selectObj, sheetName) {
            // Apply color coding based on selection
            selectObj.classList.remove('status-pass', 'status-fail', 'status-na');
            if (selectObj.value === 'Pass') selectObj.classList.add('status-pass');
            if (selectObj.value === 'Fail') selectObj.classList.add('status-fail');
            if (selectObj.value === 'N/A') selectObj.classList.add('status-na');

            // Recalculate completion for this sheet
            const safeId = sheetName.replace(/\s+/g, '-');
            const sheetDiv = document.getElementById(`sheet-${safeId}`);
            const allSelects = sheetDiv.querySelectorAll('select');
            
            let completed = 0;
            allSelects.forEach(s => {
                if (s.value !== "") completed++;
            });

            appState[sheetName].completed = completed;
            updateDashboardStats();
        }

        function updateDashboardStats() {
            Object.keys(appState).forEach(sheetName => {
                const safeId = sheetName.replace(/\s+/g, '-');
                const data = appState[sheetName];
                const card = document.getElementById(`card-${safeId}`);
                
                if (card) {
                    const percentage = Math.round((data.completed / data.total) * 100);
                    
                    const bar = card.querySelector('.progress-bar');
                    bar.style.width = `${percentage}%`;
                    
                    if(percentage === 100) {
                        bar.classList.replace('bg-blue-600', 'bg-emerald-500');
                    } else {
                        bar.classList.replace('bg-emerald-500', 'bg-blue-600');
                    }

                    card.querySelector('.progress-text').textContent = `${data.completed} / ${data.total}`;
                    
                    const badge = card.querySelector('.status-badge');
                    badge.textContent = `${percentage}%`;
                    if(percentage === 100) {
                        badge.classList.replace('bg-gray-100', 'bg-emerald-100');
                        badge.classList.replace('text-gray-500', 'text-emerald-700');
                    }
                }
            });
        }

        function applyBulkFill() {
            if (activeTabID === 'dashboard') return;

            const nameVal = document.getElementById('bulk-name').value.trim();
            const dateVal = document.getElementById('bulk-date').value;
            
            const safeId = activeTabID.replace(/\s+/g, '-');
            const activeSheet = document.getElementById(`sheet-${safeId}`);

            if (nameVal) {
                activeSheet.querySelectorAll('input.checked-by').forEach(input => input.value = nameVal);
            }
            if (dateVal) {
                activeSheet.querySelectorAll('input.date-field').forEach(input => input.value = dateVal);
            }
            
            // Visual feedback
            const btn = document.querySelector('#bulk-fill-tool button');
            const originalText = btn.textContent;
            btn.textContent = "Applied!";
            btn.classList.replace('bg-blue-600', 'bg-emerald-500');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.replace('bg-emerald-500', 'bg-blue-600');
            }, 1500);
        }

        function printPDF() {
            if(activeTabID === 'dashboard') {
                alert("Please select a specific checklist from the sidebar to print.");
                return;
            }
            window.print();
        }
    </script>
</body>
</html>
